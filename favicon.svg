<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <clipPath id="circle-clip">
      <circle cx="16" cy="16" r="15"/>
    </clipPath>
  </defs>

  <!-- Background circle -->
  <circle cx="16" cy="16" r="16" fill="#0b0b0b"/>

  <!-- Left half: organic/natural – soft curved organic shape -->
  <path d="M16 1
    C10 1, 3 6, 2 12
    C1 17, 4 23, 8 27
    C11 30, 14 31, 16 31
    Z"
    fill="#0f1a18" clip-path="url(#circle-clip)"/>

  <!-- Right half: artificial/digital – sharp geometric grid -->
  <path d="M16 1
    C18 1, 22 2, 25 5
    C29 9, 31 13, 31 16
    C31 20, 29 25, 25 28
    C22 30, 18 31, 16 31
    Z"
    fill="#060614" clip-path="url(#circle-clip)"/>

  <!-- Dividing line – the boundary between natural and artificial -->
  <path d="M16 2 C14 8, 18 14, 16 20 C14 26, 16 30, 16 31"
    fill="none" stroke="#00c5b5" stroke-width="1.2" stroke-linecap="round"/>

  <!-- Natural side: leaf-like organic curves -->
  <path d="M7 13 C9 10, 13 11, 13 15 C13 18, 9 19, 7 17 C5 15, 6 14, 7 13Z"
    fill="#00c5b5" opacity="0.85"/>
  <path d="M8 13 C10 11.5, 13 13, 13 15"
    fill="none" stroke="#0b0b0b" stroke-width="0.7" stroke-linecap="round"/>

  <!-- Artificial side: circuit-node dots and lines -->
  <line x1="19" y1="12" x2="27" y2="12" stroke="#00c5b5" stroke-width="0.9" opacity="0.6"/>
  <line x1="22" y1="12" x2="22" y2="18" stroke="#00c5b5" stroke-width="0.9" opacity="0.6"/>
  <line x1="19" y1="18" x2="27" y2="18" stroke="#00c5b5" stroke-width="0.9" opacity="0.6"/>
  <circle cx="19" cy="12" r="1.4" fill="#00c5b5"/>
  <circle cx="27" cy="12" r="1.4" fill="#00c5b5"/>
  <circle cx="22" cy="15" r="1.8" fill="#00c5b5"/>
  <circle cx="19" cy="18" r="1.4" fill="#00c5b5"/>
  <circle cx="27" cy="18" r="1.4" fill="#00c5b5"/>

  <!-- Outer ring -->
  <circle cx="16" cy="16" r="15" fill="none" stroke="#00c5b5" stroke-width="0.8" opacity="0.4"/>
</svg>
